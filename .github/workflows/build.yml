name: Build & Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: pyinstaller --onefile --windowed --name="ChatGPT" --icon=chatgpt256.png --hidden-import=browser_launcher chatgpt_app.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress

      - name: Build Installer
        run: iscc chatgpt_installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_py/ChatGPT.exe
            dist_installer/ChatGPT-Desktop-Setup.exe
          generate_release_notes: true
